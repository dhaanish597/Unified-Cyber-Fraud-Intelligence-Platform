services:
  - type: web
    name: risk-engine-api
    env: python
    region: ohio
    plan: free
    branch: deploy
    buildCommand: apt-get update && apt-get install -y --no-install-recommends libgomp1 && pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
